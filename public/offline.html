<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TraceNet — Offline</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0B1F3A" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Inter', system-ui, sans-serif;
        background: #0B1F3A;
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
      }
      .logo {
        width: 72px; height: 72px;
        border-radius: 18px;
        background: linear-gradient(135deg, #0B1F3A, #1D4ED8);
        display: flex; align-items: center; justify-content: center;
        margin-bottom: 1.5rem;
      }
      .logo svg { width: 40px; height: 40px; }
      h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
      p { color: rgba(255,255,255,0.7); max-width: 320px; line-height: 1.5; }
      button {
        margin-top: 1.5rem;
        background: #1D4ED8;
        color: #fff;
        border: none;
        border-radius: 12px;
        padding: 0.75rem 1.5rem;
        font-weight: 600;
        font-size: 0.875rem;
        cursor: pointer;
      }
      button:hover { background: #1740B8; }
    </style>
  </head>
  <body>
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2 L20 5 V11 C20 16 16 20 12 22 C8 20 4 16 4 11 V5 Z"/>
        <path d="M9 12 L11 14 L15 10" stroke-width="2.2"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>TraceNet can't reach the network right now. Cached content will be available once you reconnect.</p>
    <button onclick="location.reload()">Try again</button>
  </body>
</html>
